<svg width="280" height="285" viewBox="0 0 280 285" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!--
      The mark reads three ways simultaneously:
        1. A cornetto: arc-top (scoops) + converging lines (cone) + point (tip)
        2. A fan-out: one server node broadcasting to three client nodes
        3. The letter C: the arc opening upward = connetto initial
    -->

    <!-- Left → mint → peach gradient sweeps across the client arc -->
    <linearGradient id="arcGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#C0B4F5"/>
      <stop offset="50%"  stop-color="#76D4C0"/>
      <stop offset="100%" stop-color="#F5A47E"/>
    </linearGradient>
  </defs>

  <!-- Fan-out arms (server → each client), drawn first so nodes sit on top -->
  <line x1="140" y1="225" x2="65"  y2="100"
        stroke="#C0B4F5" stroke-width="6" stroke-linecap="round"/>
  <line x1="140" y1="225" x2="140" y2="60"
        stroke="#76D4C0" stroke-width="6" stroke-linecap="round"/>
  <line x1="140" y1="225" x2="215" y2="100"
        stroke="#F5A47E" stroke-width="6" stroke-linecap="round"/>

  <!--
    Client arc: the circle arc passing through all three client centres.
    Circle centre (140, 150.3), r ≈ 90.3.
    Goes from left client (65,100) counterclockwise through top (140,60) to right (215,100).
  -->
  <path d="M 65 100 A 90.3 90.3 0 0 0 215 100"
        fill="none"
        stroke="url(#arcGrad)"
        stroke-width="6"
        stroke-linecap="round"/>

  <!-- Client nodes -->
  <circle cx="65"  cy="100" r="14" fill="#C0B4F5"/>   <!-- lavender  -->
  <circle cx="140" cy="60"  r="18" fill="#76D4C0"/>   <!-- mint, slightly larger = main scoop -->
  <circle cx="215" cy="100" r="14" fill="#F5A47E"/>   <!-- peach     -->

  <!-- Server node: dark with a white centre dot = transmitter/hub -->
  <circle cx="140" cy="225" r="12" fill="#35304F"/>
  <circle cx="140" cy="225" r="4"  fill="white"/>

  <!-- Wordmark: extrabold name + light-weight suffix -->
  <text x="140" y="264" text-anchor="middle"
        font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">
    <tspan font-size="26" font-weight="800" fill="#2A2545">connetto</tspan><tspan
      font-size="26" font-weight="300" fill="#A09DC0">-rs</tspan>
  </text>
</svg>
