<svg width="280" height="295" viewBox="14 0 280 295"
     xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="logo-title logo-desc" focusable="false">

  <title id="logo-title">connetto-rs</title>
  <desc id="logo-desc">A cornetto-shaped fan-out mark: three pastel client nodes on a curved arc, gradient arms converging to a Rust-orange server node, tilted like a naturally held ice cream cone.</desc>

  <style>
    .t-main { fill: #312B44; }
    .t-rs   { fill: #CE422B; }
    @media (prefers-color-scheme: dark) {
      .t-main { fill: #E6E1F4; }
      .t-rs   { fill: #FF9A7D; }
    }
  </style>

  <defs>
    <!--
      The mark geometry is perfectly symmetric.
      The 6° CW rotation of the whole group (around the server node) introduces
      pleasant asymmetry systemically — the whole cornetto leans, like holding
      it naturally in your hand. No single node looks out of place.
    -->
    <linearGradient id="arcGrad" gradientUnits="userSpaceOnUse"
                    x1="66" y1="102" x2="214" y2="102">
      <stop offset="0%"   stop-color="#BDB5F3"/>
      <stop offset="50%"  stop-color="#73D1BD"/>
      <stop offset="100%" stop-color="#E7A07C"/>
    </linearGradient>
    <linearGradient id="armL" gradientUnits="userSpaceOnUse"
                    x1="140" y1="214" x2="66" y2="102">
      <stop offset="0%"   stop-color="#E8A878"/>
      <stop offset="100%" stop-color="#BDB5F3"/>
    </linearGradient>
    <linearGradient id="armC" gradientUnits="userSpaceOnUse"
                    x1="140" y1="214" x2="140" y2="62">
      <stop offset="0%"   stop-color="#E8A878"/>
      <stop offset="100%" stop-color="#73D1BD"/>
    </linearGradient>
    <linearGradient id="armR" gradientUnits="userSpaceOnUse"
                    x1="140" y1="214" x2="214" y2="102">
      <stop offset="0%"   stop-color="#E8A878"/>
      <stop offset="100%" stop-color="#E7A07C"/>
    </linearGradient>
  </defs>

  <!-- Mark rotated 6° CW around the server node (140, 214).
       Geometry is symmetric; the lean is systemic, not a misplaced node. -->
  <g transform="rotate(6, 140, 214)">

    <!-- Fan-out arms: gentle inward curves (cornetto walls, not topology lines) -->
    <g fill="none" stroke-width="7.5" stroke-linecap="round">
      <path d="M 140 214 Q 116 160 66  102" stroke="url(#armL)"/>
      <path d="M 140 214 L 140 62"          stroke="url(#armC)"/>
      <path d="M 140 214 Q 164 160 214 102" stroke="url(#armR)"/>
    </g>

    <!-- Client arc: symmetric bezier, apex at t=0.5 ≈ (140, 62) = centre node -->
    <path d="M 66 102 C 90 49, 190 49, 214 102"
          fill="none" stroke="url(#arcGrad)" stroke-width="7.5" stroke-linecap="round"/>

    <!-- Client nodes: L=11 C=16 R=15 — smaller left reduces lower-left optical weight,
         larger right adds weight high-right to counterbalance the 6° CW lean -->
    <circle cx="66"  cy="102" r="11" fill="#BDB5F3"/>
    <circle cx="140" cy="62"  r="16" fill="#73D1BD"/>
    <circle cx="214" cy="102" r="15" fill="#E7A07C"/>

    <!-- Server node: square — shape contrast signals "origin/infrastructure" vs circle clients.
         Side 25 (≈ r×1.67) optically matches the original r=15 circle. -->
    <rect x="127.5" y="201.5" width="25" height="25" fill="#CE422B"/>
    <rect x="136.5" y="210.5" width="7"  height="7"  fill="#FFF1E8"/>

  </g>

  <!-- Wordmark stays horizontal — the tilt contrast anchors the composition -->
  <text x="154" y="274" text-anchor="middle" dominant-baseline="alphabetic"
        font-family="'Avenir Next',-apple-system,BlinkMacSystemFont,'Segoe UI Variable','Segoe UI',Roboto,'Noto Sans',Ubuntu,Cantarell,'Helvetica Neue',Arial,sans-serif"
        letter-spacing="0.012em">
    <tspan class="t-main" font-size="31" font-weight="700">connetto</tspan><tspan
      class="t-rs" dx="1.5" font-size="28" font-weight="600">-rs</tspan>
  </text>

</svg>
